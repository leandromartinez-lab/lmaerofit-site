<!--
  ===========================================================
  LMAeroFit · BOTÃO "INSTALAR APP" + MODAL iOS
  Cole este bloco APENAS na home (index.html), em local
  apropriado dentro do <body> — sugestão: logo após o hero,
  antes da grid das ferramentas, ou no rodapé do hero.

  Comportamento:
    • Android/Chrome: detecta evento beforeinstallprompt, mostra
      botão "Instalar app" que aciona prompt nativo.
    • iOS Safari: mostra botão "Instalar no iPhone" que abre
      modal com instruções (Apple não suporta prompt nativo).
    • App já instalado (display-mode standalone): esconde tudo.
  ===========================================================
-->

<!-- ============ BOTÃO ============ -->
<div id="pwa-install-zone" hidden style="
  display: flex;
  justify-content: center;
  margin: 32px auto;
  padding: 0 16px;
">
  <button id="pwa-install-btn" type="button" style="
    display: inline-flex;
    align-items: center;
    gap: 10px;
    min-height: 48px;
    padding: 0 24px;
    background: transparent;
    color: #ff8a1c;
    border: 1px solid rgba(255, 138, 28, 0.4);
    border-radius: 8px;
    font-family: 'Inter Tight', -apple-system, sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background-color 120ms ease, border-color 120ms ease;
  ">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    <span id="pwa-install-label">Instalar app</span>
  </button>
</div>

<!-- ============ MODAL iOS ============ -->
<div id="pwa-ios-modal" hidden role="dialog" aria-modal="true" aria-labelledby="pwa-ios-title" style="
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  background: rgba(0, 0, 0, 0.75);
  padding: 16px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
">
  <div style="
    width: 100%;
    max-width: 440px;
    background: #0a0c0e;
    border: 1px solid rgba(255, 138, 28, 0.2);
    border-radius: 16px 16px 12px 12px;
    padding: 24px;
    color: #e8e6e1;
    font-family: 'Inter Tight', -apple-system, sans-serif;
  ">

    <div style="
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ff8a1c;
      margin-bottom: 8px;
    ">
      INSTALL · iOS
    </div>

    <h2 id="pwa-ios-title" style="
      font-family: 'Fraunces', Georgia, serif;
      font-size: 22px;
      font-weight: 500;
      line-height: 1.25;
      margin: 0 0 16px;
      color: #e8e6e1;
    ">
      Instalar no <em style="font-style: italic; color: #ff8a1c; font-weight: 400;">iPhone / iPad</em>
    </h2>

    <ol style="
      list-style: none;
      padding: 0;
      margin: 0 0 20px;
      counter-reset: step;
    ">
      <li style="
        position: relative;
        padding: 12px 0 12px 40px;
        font-size: 14px;
        line-height: 1.5;
        color: #9a978f;
        border-bottom: 1px solid rgba(255, 138, 28, 0.08);
        counter-increment: step;
      ">
        <span style="
          position: absolute;
          left: 0;
          top: 12px;
          width: 28px;
          height: 28px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: rgba(255, 138, 28, 0.1);
          border: 1px solid rgba(255, 138, 28, 0.3);
          border-radius: 50%;
          font-family: 'JetBrains Mono', monospace;
          font-size: 12px;
          color: #ff8a1c;
          font-weight: 600;
        ">1</span>
        Toque no botão <strong style="color: #e8e6e1;">Compartilhar</strong>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e8e6e1"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             style="vertical-align: middle; margin: 0 2px;">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <polyline points="16 6 12 2 8 6"/>
          <line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
         na barra do Safari.
      </li>

      <li style="
        position: relative;
        padding: 12px 0 12px 40px;
        font-size: 14px;
        line-height: 1.5;
        color: #9a978f;
        border-bottom: 1px solid rgba(255, 138, 28, 0.08);
        counter-increment: step;
      ">
        <span style="
          position: absolute;
          left: 0;
          top: 12px;
          width: 28px;
          height: 28px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: rgba(255, 138, 28, 0.1);
          border: 1px solid rgba(255, 138, 28, 0.3);
          border-radius: 50%;
          font-family: 'JetBrains Mono', monospace;
          font-size: 12px;
          color: #ff8a1c;
          font-weight: 600;
        ">2</span>
        Role e selecione <strong style="color: #e8e6e1;">Adicionar à Tela de Início</strong>.
      </li>

      <li style="
        position: relative;
        padding: 12px 0 12px 40px;
        font-size: 14px;
        line-height: 1.5;
        color: #9a978f;
        counter-increment: step;
      ">
        <span style="
          position: absolute;
          left: 0;
          top: 12px;
          width: 28px;
          height: 28px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: rgba(255, 138, 28, 0.1);
          border: 1px solid rgba(255, 138, 28, 0.3);
          border-radius: 50%;
          font-family: 'JetBrains Mono', monospace;
          font-size: 12px;
          color: #ff8a1c;
          font-weight: 600;
        ">3</span>
        Toque em <strong style="color: #e8e6e1;">Adicionar</strong>. Pronto — o ícone aparece na sua tela.
      </li>
    </ol>

    <button id="pwa-ios-close" type="button" style="
      width: 100%;
      min-height: 48px;
      background: #ff8a1c;
      color: #0a0c0e;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    ">
      Entendi
    </button>

  </div>
</div>

<!-- ============ SCRIPT ============ -->
<script>
  (function () {
    var zone   = document.getElementById('pwa-install-zone');
    var btn    = document.getElementById('pwa-install-btn');
    var label  = document.getElementById('pwa-install-label');
    var modal  = document.getElementById('pwa-ios-modal');
    var close  = document.getElementById('pwa-ios-close');

    if (!zone || !btn) return;

    // Detecta se já está instalado (rodando em modo standalone)
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches
                       || window.navigator.standalone === true;
    if (isStandalone) {
      zone.hidden = true;
      return;
    }

    // Detecta iOS Safari (não suporta beforeinstallprompt)
    var ua = window.navigator.userAgent.toLowerCase();
    var isIOS = /iphone|ipad|ipod/.test(ua) && !window.MSStream;
    // iPadOS 13+ se identifica como Mac; checagem extra por touch
    var isIPadOS = /macintosh/.test(ua) && 'ontouchend' in document;
    var isAppleMobile = isIOS || isIPadOS;

    // Guarda o evento de prompt do Chrome/Android
    var deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      deferredPrompt = e;
      label.textContent = 'Instalar app';
      zone.hidden = false;
    });

    // Em iOS, mostra o botão direto (o prompt nativo não existe)
    if (isAppleMobile) {
      label.textContent = 'Instalar no iPhone';
      zone.hidden = false;
    }

    btn.addEventListener('click', function () {
      if (isAppleMobile) {
        modal.hidden = false;
        document.body.style.overflow = 'hidden';
        return;
      }
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function (choice) {
          deferredPrompt = null;
          if (choice.outcome === 'accepted') {
            zone.hidden = true;
          }
        });
      }
    });

    if (close) {
      close.addEventListener('click', function () {
        modal.hidden = true;
        document.body.style.overflow = '';
      });
    }

    // Tap fora do conteúdo fecha o modal
    if (modal) {
      modal.addEventListener('click', function (e) {
        if (e.target === modal) {
          modal.hidden = true;
          document.body.style.overflow = '';
        }
      });
    }

    // Esconde botão quando app é instalado (Android dispara este evento)
    window.addEventListener('appinstalled', function () {
      zone.hidden = true;
      deferredPrompt = null;
    });
  })();
</script>
