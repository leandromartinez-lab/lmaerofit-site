<!--
  ===========================================================
  LMAeroFit · PWA META TAGS
  Cole este bloco dentro do <head> de TODAS as 6 páginas:
    - index.html
    - gear-lab.html
    - aero-bike-v3.html
    - race-fueling.html
    - race-weather-briefing.html
    - session-debrief.html

  Posição recomendada: logo após as meta tags existentes (charset,
  viewport, robots), ANTES dos <link rel="stylesheet">.

  Se já existir alguma tag com mesmo "name" ou "rel", remova a
  versão antiga para evitar duplicata.
  ===========================================================
-->

<!-- PWA Manifest -->
<link rel="manifest" href="/manifest.json">

<!-- Theme color para barra de status em mobile (verde aero) -->
<meta name="theme-color" content="#5a9c07">
<meta name="color-scheme" content="dark">

<!-- iOS Web App -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LMAeroFit">
<meta name="mobile-web-app-capable" content="yes">

<!-- Ícones -->
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">

<!-- Viewport com safe area para iPhone com notch -->

<!-- <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"> -->

<!--
  ===========================================================
  REGISTRO DO SERVICE WORKER
  Cole este script ANTES do fechamento </body> de todas as 6
  páginas (ou em um arquivo .js compartilhado se você tiver um).
  ===========================================================
-->

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .then(function (reg) {
          // SW registrado. Quando uma nova versão for detectada,
          // ativamos imediatamente para entregar updates rápido.
          reg.addEventListener('updatefound', function () {
            var newSW = reg.installing;
            if (!newSW) return;
            newSW.addEventListener('statechange', function () {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                // Nova versão pronta. Ativa na próxima navegação.
                newSW.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        })
        .catch(function (err) {
          // Falha silenciosa em produção; só loga em dev
          if (location.hostname === 'localhost') {
            console.warn('[SW] Registration failed:', err);
          }
        });

      // Quando o SW novo assume controle, recarrega para pegar a versão nova
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    });
  }
</script>
